<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Finora Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }
        
        .bg-particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.3), transparent);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(20px); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 5px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .user-name {
            font-size: 14px;
            color: #888;
        }
        
        .goal-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .goal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            animation: pulse 4s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .goal-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .goal-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .goal-text {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }
        
        .progress-circle-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
            z-index: 1;
        }
        
        .progress-ring {
            transform: rotate(-90deg);
        }
        
        .progress-ring-bg {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 12;
        }
        
        .progress-ring-fill {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
            filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.5));
        }
        
        .progress-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .progress-percentage {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .progress-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .balance-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.1);
            text-align: center;
        }
        
        .balance-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .balance-amount {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        
        .balance-amount.negative {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(102, 126, 234, 0.5));
        }
        
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        
        .categories-section {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .bubbles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        
        .bubble {
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(240, 147, 251, 0.2));
            border: 1px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }
        
        .bubble-label {
            color: #fff;
            font-size: 12px;
        }
        
        .bubble-value {
            color: #888;
            font-size: 11px;
        }
        
        .transactions-section {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .transaction-item:last-child {
            border-bottom: none;
        }
        
        .transaction-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        
        .transaction-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(240, 147, 251, 0.2));
        }
        
        .transaction-info {
            flex: 1;
        }
        
        .transaction-desc {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .transaction-meta {
            font-size: 11px;
            color: #666;
        }
        
        .transaction-amount {
            font-size: 16px;
            font-weight: 700;
        }
        
        .transaction-amount.income {
            color: #10b981;
        }
        
        .transaction-amount.expense {
            color: #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #667eea, #f093fb);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-particles">
        <div class="particle" style="width: 100px; height: 100px; top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="width: 150px; height: 150px; top: 60%; left: 70%; animation-delay: 3s;"></div>
        <div class="particle" style="width: 80px; height: 80px; top: 80%; left: 20%; animation-delay: 6s;"></div>
    </div>
    
    <div class="container" id="app">
        <div class="loading">⏳ Загрузка...</div>
    </div>
    
    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Get user data from Telegram
        const user = tg.initDataUnsafe.user || {};
        const userName = user.first_name || 'Пользователь';
        const userId = user.id;
        
        // Load stats from API
        async function loadStats() {
            try {
                const response = await fetch(`/api/stats?initData=${encodeURIComponent(tg.initData)}`);
                if (!response.ok) throw new Error('Failed to load stats');
                
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('app').innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            }
        }
        
        function formatNumber(n) {
            return Math.floor(n).toLocaleString('ru-RU').replace(/,/g, ' ');
        }
        
        function renderDashboard(stats) {
            const hasGoal = stats.user_info && stats.user_info.goal;
            const progress = hasGoal && stats.user_info.income_amt > 0 
                ? Math.min(Math.floor((stats.balance / stats.user_info.income_amt) * 100), 150)
                : 0;
            
            let html = `
                <div class="header">
                    <div class="logo">💎 FINORA</div>
                    <div class="user-name">${userName}</div>
                </div>
            `;
            
            // Goal card
            if (hasGoal) {
                html += `
                    <div class="goal-card">
                        <div class="goal-header">
                            <div class="goal-title">🎯 Твоя цель</div>
                            <div class="goal-text">${stats.user_info.goal}</div>
                        </div>
                        <div class="progress-circle-wrapper">
                            <svg class="progress-ring" width="220" height="220">
                                <defs>
                                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                                <circle class="progress-ring-bg" cx="110" cy="110" r="95"/>
                                <circle class="progress-ring-fill" cx="110" cy="110" r="95"
                                        id="progressCircle"
                                        stroke-dasharray="597" 
                                        stroke-dashoffset="597"/>
                            </svg>
                            <div class="progress-center">
                                <div class="progress-percentage" id="progressPercent">0%</div>
                                <div class="progress-label">Прогресс</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Balance card
            const balanceClass = stats.balance < 0 ? 'negative' : '';
            html += `
                <div class="balance-card">
                    <div class="balance-label">💰 Баланс</div>
                    <div class="balance-amount ${balanceClass}">${formatNumber(stats.balance)}</div>
                    <div style="font-size: 12px; color: #666; margin-top: 5px;">so'm</div>
                </div>
            `;
            
            // Stats grid
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📈</div>
                        <div class="stat-label">Доходы</div>
                        <div class="stat-value">${formatNumber(stats.month_income)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📉</div>
                        <div class="stat-label">Расходы</div>
                        <div class="stat-value">${formatNumber(stats.month_expense)}</div>
                    </div>
                </div>
            `;
            
            // Categories bubbles
            if (stats.categories && stats.categories.length > 0) {
                html += `
                    <div class="categories-section">
                        <div class="section-title">
                            <span>🔥</span>
                            <span>Топ расходы</span>
                        </div>
                        <div class="bubbles-container">
                `;
                stats.categories.slice(0, 6).forEach(cat => {
                    html += `
                        <div class="bubble">
                            <div class="bubble-label">${cat.category}</div>
                            <div class="bubble-value">${formatNumber(cat.total)}</div>
                        </div>
                    `;
                });
                html += `
                        </div>
                    </div>
                `;
            }
            
            // Transactions list
            html += `
                <div class="transactions-section">
                    <div class="section-title">
                        <span>📋</span>
                        <span>Последние транзакции</span>
                    </div>
            `;
            
            if (stats.transactions && stats.transactions.length > 0) {
                stats.transactions.slice(0, 15).forEach(tx => {
                    const icon = tx.type === 'inc' ? '📈' : '📉';
                    const amountClass = tx.type === 'inc' ? 'income' : 'expense';
                    const sign = tx.type === 'inc' ? '+' : '-';
                    
                    html += `
                        <div class="transaction-item">
                            <div class="transaction-left">
                                <div class="transaction-icon">${icon}</div>
                                <div class="transaction-info">
                                    <div class="transaction-desc">${tx.description || tx.category}</div>
                                    <div class="transaction-meta">${tx.category} • ${tx.created_at || ''}</div>
                                </div>
                            </div>
                            <div class="transaction-amount ${amountClass}">${sign}${formatNumber(tx.amount)}</div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div class="empty-state">
                       <div style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;">📭</div>
                        <div>Пока нет транзакций</div>
                        <div style="font-size: 12px; margin-top: 10px;">Начни записывать в боте!</div>
                    </div>
                `;
            }
            
            html += `</div>`;
            
            document.getElementById('app').innerHTML = html;
            
            // Animate progress circle
            if (hasGoal && progress > 0) {
                setTimeout(() => animateProgress(progress), 300);
            }
        }
        
        function animateProgress(targetProgress) {
            const circle = document.getElementById('progressCircle');
            const percentText = document.getElementById('progressPercent');
            const circumference = 2 * Math.PI * 95;
            
            let current = 0;
            const interval = setInterval(() => {
                if (current >= targetProgress) {
                    clearInterval(interval);
                    return;
                }
                current += 2;
                if (current > targetProgress) current = targetProgress;
                
                const offset = circumference - (current / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                percentText.textContent = current + '%';
            }, 20);
        }
        
        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
